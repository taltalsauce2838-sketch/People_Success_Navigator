<!DOCTYPE html>
<html lang="ja">
<head>
  <title>People Success Navigator | Login</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="icon" type="image/png" href="./assets/psn-icon.png" />
</head>
<body class="login-page">
  <div class="login-side"></div>

  <main class="login-shell">
    <section class="login-card">
      <div class="login-brand"><img src="./assets/psn-icon.png" alt="People Success Navigator アイコン" /></div>
      <h1 class="login-title">People Success Navigator</h1>
      <p class="login-subtitle">ログインして続行してください</p>

      <form id="loginForm">
        <div class="field-group">
          <label for="email">ユーザーID</label>
          <input
            class="input"
            id="email"
            type="text"
            placeholder="ユーザーIDを入力してください"
            autocomplete="username"
          />
        </div>

        <div class="field-group">
          <label for="password">パスワード</label>
          <input
            class="input"
            id="password"
            type="password"
            placeholder="パスワードを入力してください"
            autocomplete="current-password"
          />
        </div>

        <div id="loginMessage" class="form-message" aria-live="polite"></div>

        <div class="btn-row">
          <button
            id="loginButton"
            type="submit"
            class="btn btn-primary btn-block"
          >
            ログイン
          </button>
        </div>
      </form>

      <div class="info-box">
        <h4>ログイン情報について</h4>
        <p>
          ユーザーIDに基づいて、人事部門・マネージャーは管理系ダッシュボード、
          エンジニアはエンジニア向けダッシュボードへ遷移する想定です。
        </p>
      </div>
    </section>
  </main>

  <div class="login-side"></div>

  <script type="module" src="./js/auth.js"></script>
</body>
</html>
